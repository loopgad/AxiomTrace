name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang

      - name: Configure
        run: cmake -B build -DAXIOM_BUILD_TESTS=ON -DCMAKE_C_COMPILER=clang

      - name: Build
        run: cmake --build build --parallel

      - name: Run host tests
        run: ctest --test-dir build --output-on-failure
