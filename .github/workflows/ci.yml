name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ===========================================================================
  # Host Build & Test (primary gating step)
  # ===========================================================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang clang-tidy cppcheck

      - name: Configure
        run: cmake -B build -DAXIOM_BUILD_TESTS=ON -DCMAKE_C_COMPILER=clang

      - name: Build
        run: cmake --build build --parallel

      - name: Run host tests
        run: ctest --test-dir build --output-on-failure

      - name: Run cppcheck (advisory)
        run: |
          cppcheck \
            --enable=all \
            --error-exitcode=1 \
            --inline-suppr \
            --suppress=missingIncludeSystem \
            -I baremetal/include \
            -I baremetal/port \
            -I baremetal/core \
            -I baremetal/frontend \
            -I baremetal/backend \
            -I baremetal \
            baremetal/core baremetal/frontend baremetal/backend baremetal/port \
            --suppress=unmatchedSuppression \
            --suppress=nullPointerRedundantCheck \
            --suppress=ctuOneDefinitionRisky \
            2>&1 | head -50
        continue-on-error: true

      - name: Run scan-build (advisory)
        run: |
          scan-build --status-bugs \
            cmake -B build-scan -DAXIOM_BUILD_TESTS=ON -DCMAKE_C_COMPILER=clang \
            -DAXIOM_PLATFORM=host -DAXIOM_SOC=generic 2>&1 | head -20
          scan-build --status-bugs \
            cmake --build build-scan --parallel 2>&1 | head -50
        continue-on-error: true

  # ===========================================================================
  # ARM Cortex-M QEMU Test
  # ===========================================================================
  cortex-m-qemu-test:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM GCC and QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            qemu-system-arm

      - name: Configure Cortex-M build
        run: |
          cmake -B build-cortex-m \
            -DAXIOM_PLATFORM=cortex-m \
            -DAXIOM_SOC=generic \
            -DCMAKE_SYSTEM_NAME=Generic \
            -DCMAKE_SYSTEM_PROCESSOR=cortex-m3 \
            -DCMAKE_C_COMPILER=arm-none-eabi-gcc \
            -DCMAKE_C_FLAGS="-mcpu=cortex-m3 -mthumb" \
            -DAXIOM_BUILD_TESTS=OFF \
            -DAXIOM_BUILD_EXAMPLES=OFF

      - name: Build Cortex-M library
        run: cmake --build build-cortex-m --target axiomtrace --parallel

      - name: Verify Cortex-M build artifacts
        run: |
          ls -la build-cortex-m/libaxiomtrace.a
          arm-none-eabi-objdump -h build-cortex-m/libaxiomtrace.a 2>/dev/null | head -20 || true
          echo "Cortex-M build artifact created successfully"

      - name: Upload Cortex-M artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cortex-m-artifacts
          path: |
            build-cortex-m/libaxiomtrace.a
            build-cortex-m/examples/*
          retention-days: 7

  # ===========================================================================
  # Precompiled Library Builds (STM32F4, nRF52, ESP32)
  # ===========================================================================
  build-library-stm32f4:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Install ARM GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi
      - name: Configure STM32F4 build
        run: |
          cmake -B build-stm32f4 \
            -DAXIOM_PLATFORM=cortex-m \
            -DAXIOM_SOC=stm32f4 \
            -DCMAKE_SYSTEM_NAME=Generic \
            -DCMAKE_SYSTEM_PROCESSOR=cortex-m4
      - name: Build STM32F4 static library
        run: |
          cmake --build build-stm32f4 --target axiomtrace --parallel
          mkdir -p dist
          cp build-stm32f4/libaxiomtrace.a dist/axiomtrace-stm32f4.a
      - name: Generate STM32F4 CMake config
        run: |
          cat > dist/axiomtrace-stm32f4.cmake << 'EOF'
          # AxiomTrace STM32F4 Precompiled Library Configuration
          cmake_minimum_required(VERSION 3.16)
          set(AXIOMTRACE_STM32F4_LIBRARY "${CMAKE_CURRENT_LIST_DIR}/axiomtrace-stm32f4.a")
          set(AXIOMTRACE_STM32F4_INCLUDE_DIRS
              "${CMAKE_CURRENT_LIST_DIR}/../baremetal/include"
              "${CMAKE_CURRENT_LIST_DIR}/../baremetal/port"
              "${CMAKE_CURRENT_LIST_DIR}/../baremetal/core"
              "${CMAKE_CURRENT_LIST_DIR}/../baremetal/frontend"
              "${CMAKE_CURRENT_LIST_DIR}/../baremetal/backend"
          )
          add_library(axiomtrace_stm32f4 STATIC IMPORTED)
          set_target_properties(axiomtrace_stm32f4 PROPERTIES
              IMPORTED_LOCATION "${AXIOMTRACE_STM32F4_LIBRARY}"
              INTERFACE_INCLUDE_DIRECTORIES "${AXIOMTRACE_STM32F4_INCLUDE_DIRS}"
          )
          EOF
      - name: Upload STM32F4 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stm32f4-library
          path: dist/
          retention-days: 30

  build-library-nrf52:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Install ARM GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi
      - name: Configure nRF52 build
        run: |
          cmake -B build-nrf52 \
            -DAXIOM_PLATFORM=cortex-m \
            -DAXIOM_SOC=nrf52 \
            -DCMAKE_SYSTEM_NAME=Generic \
            -DCMAKE_SYSTEM_PROCESSOR=cortex-m4
      - name: Build nRF52 static library
        run: |
          cmake --build build-nrf52 --target axiomtrace --parallel
          mkdir -p dist
          cp build-nrf52/libaxiomtrace.a dist/axiomtrace-nrf52.a
      - name: Generate nRF52 CMake config
        run: |
          cat > dist/axiomtrace-nrf52.cmake << 'EOF'
          # AxiomTrace nRF52 Precompiled Library Configuration
          cmake_minimum_required(VERSION 3.16)
          set(AXIOMTRACE_NRF52_LIBRARY "${CMAKE_CURRENT_LIST_DIR}/axiomtrace-nrf52.a")
          set(AXIOMTRACE_NRF52_INCLUDE_DIRS
              "${CMAKE_CURRENT_LIST_DIR}/../baremetal/include"
              "${CMAKE_CURRENT_LIST_DIR}/../baremetal/port"
              "${CMAKE_CURRENT_LIST_DIR}/../baremetal/core"
              "${CMAKE_CURRENT_LIST_DIR}/../baremetal/frontend"
              "${CMAKE_CURRENT_LIST_DIR}/../baremetal/backend"
          )
          add_library(axiomtrace_nrf52 STATIC IMPORTED)
          set_target_properties(axiomtrace_nrf52 PROPERTIES
              IMPORTED_LOCATION "${AXIOMTRACE_NRF52_LIBRARY}"
              INTERFACE_INCLUDE_DIRECTORIES "${AXIOMTRACE_NRF52_INCLUDE_DIRS}"
          )
          EOF
      - name: Upload nRF52 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nrf52-library
          path: dist/
          retention-days: 30

  build-library-esp32:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    container:
      image: espressif/esp-idf:latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup ESP-IDF environment
        run: . /opt/esp-idf/export.sh
      - name: Configure ESP32 build
        run: |
          . /opt/esp-idf/export.sh
          cmake -B build-esp32 \
            -DAXIOM_PLATFORM=esp32 \
            -DAXIOM_SOC=esp32 \
            -DCMAKE_SYSTEM_NAME=Generic \
            -DCMAKE_SYSTEM_PROCESSOR=xtensa
      - name: Build ESP32 static library
        run: |
          . /opt/esp-idf/export.sh
          cmake --build build-esp32 --target axiomtrace --parallel
          mkdir -p dist
          cp build-esp32/libaxiomtrace.a dist/axiomtrace-esp32.a
      - name: Generate ESP32 CMake config
        run: |
          cat > dist/axiomtrace-esp32.cmake << 'EOF'
          # AxiomTrace ESP32 Precompiled Library Configuration
          cmake_minimum_required(VERSION 3.16)
          set(AXIOMTRACE_ESP32_LIBRARY "${CMAKE_CURRENT_LIST_DIR}/axiomtrace-esp32.a")
          set(AXIOMTRACE_ESP32_INCLUDE_DIRS
              "${CMAKE_CURRENT_LIST_DIR}/../baremetal/include"
              "${CMAKE_CURRENT_LIST_DIR}/../baremetal/port"
              "${CMAKE_CURRENT_LIST_DIR}/../baremetal/core"
              "${CMAKE_CURRENT_LIST_DIR}/../baremetal/frontend"
              "${CMAKE_CURRENT_LIST_DIR}/../baremetal/backend"
              "${CMAKE_CURRENT_LIST_DIR}/../baremetal/ports/esp32"
          )
          add_library(axiomtrace_esp32 STATIC IMPORTED)
          set_target_properties(axiomtrace_esp32 PROPERTIES
              IMPORTED_LOCATION "${AXIOMTRACE_ESP32_LIBRARY}"
              INTERFACE_INCLUDE_DIRECTORIES "${AXIOMTRACE_ESP32_INCLUDE_DIRS}"
          )
          EOF
      - name: Upload ESP32 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32-library
          path: dist/
          retention-days: 30

  # ===========================================================================
  # Python Package Build & Publish
  # ===========================================================================
  python-package:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build Python package
        run: |
          cd tool
          python -m build
      - name: Upload Python package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: tool/dist/
          retention-days: 7
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install twine
          twine upload tool/dist/*

  # ===========================================================================
  # Dist Artifacts Collection
  # ===========================================================================
  collect-dist:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    needs: [build-library-stm32f4, build-library-nrf52, build-library-esp32, python-package]
    steps:
      - name: Create dist directory
        run: mkdir -p dist
      - name: Download STM32F4 artifacts
        uses: actions/download-artifact@v4
        with:
          name: stm32f4-library
          path: dist/stm32f4
      - name: Download nRF52 artifacts
        uses: actions/download-artifact@v4
        with:
          name: nrf52-library
          path: dist/nrf52
      - name: Download ESP32 artifacts
        uses: actions/download-artifact@v4
        with:
          name: esp32-library
          path: dist/esp32
      - name: Copy library files to dist root
        run: |
          cp dist/stm32f4/*.a dist/ 2>/dev/null || true
          cp dist/stm32f4/*.cmake dist/ 2>/dev/null || true
          cp dist/nrf52/*.a dist/ 2>/dev/null || true
          cp dist/nrf52/*.cmake dist/ 2>/dev/null || true
          cp dist/esp32/*.a dist/ 2>/dev/null || true
          cp dist/esp32/*.cmake dist/ 2>/dev/null || true
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts
          path: dist/
          retention-days: 90
      - name: List dist contents
        run: ls -la dist/
